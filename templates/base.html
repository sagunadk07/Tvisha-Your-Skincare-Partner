<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}TVISHA{% endblock %}</title>
<!-- Google Fonts -->
<link rel="preconnect"
href="https://fonts.googleapis.com">
<link rel="preconnect" 
href="https://fonts.gstatic.com"
crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap"
rel="stylesheet">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- CSS -->
<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>
<!-- ==========================
         Navigation Bar
    ========================== -->
<nav class="navbar">
<div class="container">
<!-- Logo -->
<a href="/" class="logo">
                TVISHA<span>Skin</span>
</a>
<!-- Navigation Menu -->
<ul class="nav-links">
<li><a href="/">Home</a></li>
<li><a href="#how-it-works">How It Works</a></li>
<li><a href="#conditions">Skin Conditions</a></li>
<li><a href="/about">About</a></li>
</ul>
<!-- Button -->
<a href="#upload" class="nav-btn">
                Analyze Skin
</a>
</div>
</nav>
<!-- Page Content -->
    {% block content %}
    {% endblock %}
<!-- JavaScript -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
